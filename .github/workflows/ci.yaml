name: CI

on:
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        name: Build classes
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: oracle
                  java-version: 25

            - name: Make Gradle wrapper executable
              run: chmod +x ./gradlew

            - name: Compile classes
              run: ./gradlew classes

    test:
        name: Run JUnit tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: oracle
                  java-version: 25

            - name: Make Gradle wrapper executable
              run: chmod +x ./gradlew

            - name: Run tests
              run: ./gradlew test

    format:
        name: Check formatting
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: oracle
                  java-version: 25

            - name: Make Gradle wrapper executable
              run: chmod +x ./gradlew

            - name: Run Spotless check
              run: ./gradlew spotlessCheck
